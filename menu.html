<!DOCTYPE html>
<html>
<head>
<title>Menu - Nyawiji Roso</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
/* CSS IDENTIK */
body{ margin:0; font-family:'Segoe UI',sans-serif; background:#f2f2f2; overflow-x: hidden; }
@font-face{ font-family:'JAWAPALSU'; src:url('font/JAWAPALSU.TTF'); }
.navbar{ display:flex; align-items:center; justify-content:space-between; padding:15px 20px; position:sticky; top:0; z-index:1000; background: rgba(6, 24, 65, 0.75); backdrop-filter: blur(15px); border: none; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
.nav-title{ position:absolute; left:50%; transform:translateX(-50%); font-family:'JAWAPALSU', sans-serif; font-weight:bold; font-size:25px; color:white; pointer-events:none; z-index:1; width: max-content; text-align: center; }
.logo-box{ width:45px; height:45px; object-fit: cover; border-radius:50%; z-index:2; border: 1px solid rgba(255,255,255,0.2); }
.nav-links{ display:flex; gap:20px; margin-left:auto; z-index:2; }
.nav-links a{ color:white; text-decoration:none; font-size:14px; padding:8px 15px; border-radius:8px; transition:all 0.4s ease-in-out; font-weight: 500; }
.nav-links a:hover{ background:rgba(255, 255, 255, 0.15); transform:translateY(-2px); }
.hamburger{ cursor:pointer; font-size:22px; color:white; display:none; z-index:2; }
@media(max-width:768px){ .nav-links{display:none;} .hamburger{display:block;} .nav-title { position: absolute; left: 50%; transform: translateX(-50%); font-size: 22px; } }
.menu-dropdown{ position:absolute; top:100%; right:20px; margin-top:10px; background:rgba(6, 24, 65, 0.9); backdrop-filter:blur(15px); border-radius:10px; display:flex; flex-direction:column; min-width:160px; opacity:0; transform: scale(0.8) translateY(-15px); pointer-events:none; transition:0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index:9999; }
.menu-dropdown a{ padding:15px 20px; text-decoration:none; color:white; transition:0.3s; }
.menu-dropdown.show{ opacity:1; transform: scale(1) translateY(0); pointer-events:auto; }

main { min-height: 80vh; padding: 100px 20px; text-align: center; background: linear-gradient(to bottom, #6f4819, #1e2a47); color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; }
.coming-soon { font-size: 5rem; font-weight: 900; letter-spacing: 5px; text-shadow: 0 0 25px rgba(255, 255, 255, 0.8); margin: 0; opacity: 0; transform: scale(0.5); animation: popup 1s cubic-bezier(0.175, 0.885, 0.32, 1.27) forwards; }
.sub-text { font-size: 1.2rem; margin-top: 15px; opacity: 0; animation: fadeIn 1.5s ease forwards 0.5s; }
@keyframes popup { to { opacity: 1; transform: scale(1); } }
@keyframes fadeIn { to { opacity: 0.8; } }
footer{ background:#1e2a47; color:white; padding:40px 20px; display:flex; justify-content:space-between; align-items:center; }
@media(max-width:768px){ .coming-soon { font-size: 2.5rem; } footer { flex-direction:column; text-align:center; gap: 15px;} }
</style>
</head>
<body>
<header class="navbar">
    <a href="index.html"><img src="Foto%20Nyawiji%20Roso/Logo/Logo%20Nawiji%20Roso.png" class="logo-box" alt="Logo"></a>
    <div class="nav-title">Nyawiji Roso</div>
    <div class="nav-links"><a href="index.html">Home</a><a href="about.html">About</a><a href="menu.html">Menu</a><a href="contact.html">Contact</a></div>
    <div class="hamburger" onclick="toggleMenu()">☰</div>
    <div class="menu-dropdown" id="menuDropdown"><a href="index.html">Home</a><a href="about.html">About</a><a href="menu.html">Menu</a><a href="contact.html">Contact</a></div>
</header>
<main>
    <h1 class="coming-soon">COMING SOON</h1>
    <p class="sub-text">Daftar menu spesial, sama spesialnya sperti dirimu, akan segera hadir untuk customer tercintahhhh.</p>
</main>
<footer><p>by team digital_berkarya</p><p>Nyawiji Roso © 2026</p></footer>
<script>function toggleMenu(){ document.getElementById("menuDropdown").classList.toggle("show"); }</script>
</body>
</html>
