<!DOCTYPE html>
<html>
<head>
<title>Contact - Nyawiji Roso</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{ margin:0; font-family:'Segoe UI',sans-serif; background:#f2f2f2; overflow-x: hidden; }

@font-face{ font-family:'JAWAPALSU'; src:url('font/JAWAPALSU.TTF'); }

.navbar{
 display:flex; align-items:center; justify-content:space-between;
 padding:15px 20px; position:sticky; top:0; z-index:1000;
 background: rgba(6, 24, 65, 0.75);
 backdrop-filter: blur(15px);
 box-shadow: 0 4px 20px rgba(0,0,0,0.2);
}

.nav-title{
 position:absolute; left:50%; transform:translateX(-50%);
 font-family:'JAWAPALSU', sans-serif;
 font-size:25px; color:white;
}

.logo-box{
 width:45px; height:45px; border-radius:50%;
}

.nav-links{ display:flex; gap:20px; }

.nav-links a{
 color:white; text-decoration:none;
 padding:8px 15px; border-radius:8px;
}

main{
 min-height: 100vh;
 padding: 100px 20px;
 text-align: center;
 background: #1e2a47;
 color: white;
 display:flex;
 flex-direction:column;
 align-items:center;
}

.location{
 font-size:1.2rem;
 margin-bottom:20px;
 opacity:0;
 animation:fadeIn 1.5s forwards;
}

.coming-soon{
 font-size:4rem;
 margin-top:30px;
 opacity:0;
 animation:popup 1s forwards;
}

.contact-info{
 margin-top:20px;
}

.contact-actions{
 margin-top:20px;
}

.wa-btn{
 padding:12px 25px;
 background:#25D366;
 color:white;
 border-radius:8px;
 text-decoration:none;
}

.social{
 margin-top:20px;
}

.social a{
 display:block;
 color:white;
 margin:5px 0;
 text-decoration:none;
}

.contact-form{
 margin-top:40px;
 width:100%;
 max-width:400px;
}

.contact-form input,
.contact-form textarea{
 width:100%;
 padding:12px;
 margin:8px 0;
 border-radius:8px;
 border:none;
}

.contact-form button{
 width:100%;
 padding:12px;
 background:#ffcc70;
 border:none;
 border-radius:8px;
 cursor:pointer;
}

footer{
 background:#1e2a47;
 color:white;
 padding:20px;
 display:flex;
 justify-content:space-between;
}

@keyframes fadeIn{
 to{ opacity:1; }
}

@keyframes popup{
 from{ opacity:0; transform:scale(0.5); }
 to{ opacity:1; transform:scale(1); }
}
</style>
</head>

<body>

<header class="navbar">
<img src="Foto%20Nyawiji%20Roso/Logo/Logo%20Nawiji%20Roso.png" class="logo-box">
<div class="nav-title">Nyawiji Roso</div>
<div class="nav-links">
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Menu</a>
<a href="#">Contact</a>
</div>
</header>

<main>

<!-- LOKASI -->
<div class="location">
📍 Lokasi: (https://maps.app.goo.gl/1PASQY89v4ino7or7)
</div>

<!-- CONTACT -->
<div class="contact-info">
<p>📞 +62 812-3236-1176</p>
<p>📧 digitalberkarya5@gmail.com</p>
</div>

<!-- WHATSAPP -->
<div class="contact-actions">
<a href="https://wa.me/6281232361176" target="_blank" class="wa-btn">
💬 Chat WhatsApp
</a>
</div>

<!-- SOSIAL MEDIA -->
<div class="social">
<a href="https://www.tiktok.com/@nyawiji.roso" target="_blank">🎵 TikTok</a>
<a href="https://www.instagram.com/nyawiji.roso/" target="_blank">📸 Instagram</a>
</div>

<!-- FORM -->
<div class="contact-form">
<h3>Hubungi Kami</h3>
<form onsubmit="kirimPesan(event)">
<input type="text" placeholder="Nama..." required>
<input type="email" placeholder="Email..." required>
<textarea placeholder="Pesan..." required></textarea>
<button type="submit">Kirim</button>
</form>
</div>

<!-- COMING SOON -->
<h1 class="coming-soon">COMING SOON</h1>

</main>

<footer>
<p>by team digital_berkarya</p>
<p>Nyawiji Roso © 2026</p>
</footer>

<script>
function kirimPesan(e){
 e.preventDefault();
 alert("Pesan berhasil dikirim!");
}
</script>

</body>
</html>
